<!doctype html>
<html>

<head lang="en">
	<title>Toggle area Settings</title>
	<meta charset="utf-8" />
	<script src="./sdpi-components.js"></script>
	<script type="module" src="./common.js"></script>
	<script src="./locale.js"></script>
	<link rel="stylesheet" href="./styles.css" />
</head>

<body>
	<sdpi-item label="__MSG_toggle-area.fields.areaId__">
		<sdpi-select setting="areaId" datasource="getClickableAreas" loading="__MSG_toggle-area.loading-areas__"
			hot-reload> </sdpi-select>
	</sdpi-item>
	<sdpi-item label="__MSG_toggle-area.fields.state__">
		<sdpi-select setting="state" default="toggle">
			<option value="true">__MSG_toggle-area.state.ENABLE__</option>
			<option value="false">__MSG_toggle-area.state.DISABLE__</option>
			<option value="toggle">__MSG_toggle-area.state.TOGGLE__</option>
		</sdpi-select>
	</sdpi-item>
</body>

</html>
